name: Check MCP Extension

on:
  push:
    branches:
      - main
    paths:
      - 'arduino-mcp-extension/**'
      - 'arduino-ide-extension/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/check-mcp-extension.yml'
  pull_request:
    paths:
      - 'arduino-mcp-extension/**'
      - 'arduino-ide-extension/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/check-mcp-extension.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build arduino-mcp-extension
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies (skip native builds)
        run: yarn install --mode=skip-build

      # Note: build steps use `npm run` instead of `yarn run`. Yarn 4 only
      # exposes binaries declared by the workspace itself, and
      # arduino-ide-extension gets `tsc` from the repo root - with yarn the
      # build silently falls back to whatever global tsc is on the runner.
      - name: Prepare arduino-ide-extension resources
        run: |
          mkdir -p arduino-ide-extension/src/node/resources
          npm run copy-i18n --prefix arduino-ide-extension

      - name: Show TypeScript version
        run: node node_modules/typescript/bin/tsc --version

      - name: Build arduino-ide-extension
        run: npm run build --prefix arduino-ide-extension

      - name: Build arduino-mcp-extension
        run: npm run build --prefix arduino-mcp-extension
