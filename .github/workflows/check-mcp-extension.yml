name: Check MCP Extension

on:
  push:
    branches:
      - main
    paths:
      - 'arduino-mcp-extension/**'
      - 'arduino-ide-extension/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/check-mcp-extension.yml'
  pull_request:
    paths:
      - 'arduino-mcp-extension/**'
      - 'arduino-ide-extension/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/check-mcp-extension.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build arduino-mcp-extension
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies (skip native builds)
        run: yarn install --mode=skip-build

      - name: Prepare arduino-ide-extension resources
        run: |
          mkdir -p arduino-ide-extension/src/node/resources
          yarn --cwd arduino-ide-extension copy-i18n

      - name: Build arduino-ide-extension
        run: yarn --cwd arduino-ide-extension build

      - name: Build arduino-mcp-extension
        run: yarn --cwd arduino-mcp-extension build
