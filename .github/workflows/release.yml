name: Release

# Fork-specific release workflow.
#
# Builds the Arduino IDE + MCP extension on Windows, Linux, and macOS and
# attaches the (unsigned) apps to a GitHub Release as a DRAFT, so you can test
# the artifacts before publishing. This intentionally does NOT sign, notarize,
# or publish to Arduino's S3 - that machinery lived in the upstream build.yml,
# which needs Arduino-org secrets a fork does not have.
#
# Trigger by pushing a tag (e.g. `git tag v0.5.0 && git push origin v0.5.0`)
# or manually via the Actions tab (workflow_dispatch) with a version input.
#
# NOTE: the underlying build was verified end-to-end on Windows. The Linux and
# macOS jobs run the same commands (which upstream also builds on those OSes);
# treat the first run as a shake-out and expect to iterate on runner specifics.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag/version (e.g. v0.5.0)'
        required: true

permissions:
  contents: write # required to create/update the GitHub Release

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false # one platform failing should not block the others
      matrix:
        include:
          # Pinned to windows-2022, NOT windows-latest: the latest image ships
          # Visual Studio 18 (2026), which no released node-gyp can detect - it
          # reports `unknown version "undefined"` and ERR_CHILD_PROCESS_STDIO_
          # MAXBUFFER from its PowerShell VS probe, breaking every native-module
          # build. windows-2022 has VS 2022 17.x (what node-gyp expects, and
          # what local builds use). Revisit when node-gyp gains VS 18 support.
          - os: windows-2022
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      # Produce unsigned artifacts: never auto-discover signing identities.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      # Authenticate GitHub downloads (e.g. @vscode/ripgrep) to avoid the
      # unauthenticated rate-limit 403s that flake the install on CI.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18.x'
          # Corepack-managed Yarn 4 is enabled below; skip the cache probe that
          # would otherwise run global Yarn 1 against the packageManager field.
          package-manager-cache: false

      - name: Setup Python
        # 3.11 still ships distutils, which node-gyp needs (3.12 removed it).
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Go
        # download-ls builds the Arduino Language Server from source with Go.
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Linux build libraries
        # native-keymap needs x11/xkbfile; keytar needs libsecret.
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxkbfile-dev libsecret-1-dev

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            yarn install && exit 0
            echo "yarn install attempt $attempt failed; retrying in 20s..."
            sleep 20
          done
          echo "yarn install failed after 3 attempts"; exit 1

      - name: Prepare build launcher shims
        run: yarn prepare:shims

      - name: Download Arduino resources (CLI, LS, firmware uploader, examples)
        # downloads.arduino.cc occasionally returns transient 503s; retry.
        shell: bash
        run: |
          for attempt in 1 2 3 4; do
            yarn --cwd arduino-ide-extension prepare && exit 0
            echo "Resource download attempt $attempt failed; retrying in 20s..."
            sleep 20
          done
          echo "Resource download failed after 4 attempts"; exit 1

      - name: Download bundled VS Code plugins
        shell: bash
        run: |
          for attempt in 1 2 3 4; do
            yarn --cwd electron-app prepare && exit 0
            echo "Plugin download attempt $attempt failed; retrying in 20s..."
            sleep 20
          done
          echo "Plugin download failed after 4 attempts"; exit 1

      - name: Compile extension workspaces (TypeScript)
        # electron-app's production webpack imports the COMPILED lib/ of both
        # extensions (e.g. arduino-ide-extension/lib/node/theia/filesystem/
        # parcel-watcher). The per-workspace `prepare` only downloads CLI/LS/
        # examples - it does not run tsc - so lib/ must be built explicitly here,
        # or the webpack config fails to load ("Cannot find module ...lib/...").
        # Use `npm run --prefix` (not `yarn --cwd`): arduino-ide-extension does
        # not declare a local typescript, and Yarn 4 bin-scoping would fall back
        # to a stale global tsc; npm adds the hoisted node_modules/.bin (tsc
        # 5.8.2) to PATH.
        shell: bash
        run: |
          mkdir -p arduino-ide-extension/src/node/resources
          npm run --prefix arduino-ide-extension build
          npm run --prefix arduino-mcp-extension build

      - name: Rebuild native modules for Electron
        # Must run BEFORE the production webpack build: the NativeWebpackPlugin
        # bundles whatever pty.node (and other .node) is present in node_modules
        # into the backend output. yarn install builds a Node-ABI pty.node;
        # rebuild:electron recompiles it against Electron's ABI. If this ran
        # after the webpack build, the packaged app would ship a Node-ABI native
        # module and crash on launch under Electron.
        working-directory: electron-app
        run: node ../node_modules/@theia/cli/bin/theia rebuild:electron

      - name: Production build
        working-directory: electron-app
        run: node ../node_modules/@theia/cli/bin/theia build --config webpack.config.js --mode production

      - name: Package (unpacked)
        working-directory: electron-app
        # Force bash on all platforms: under PowerShell (the Windows default)
        # the `-c.extraMetadata.main=./...` argument is mis-tokenized and
        # electron-builder treats it as a config-file path (ENOENT). bash parses
        # it correctly - which is why the Linux/macOS jobs already pass.
        shell: bash
        run: >
          node ../node_modules/electron-builder/cli.js --dir --publish never
          -c.electronVersion=30.1.2
          -c.extraMetadata.name=arduino-ide
          -c.extraMetadata.main=./arduino-ide-electron-main.js

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = Get-ChildItem -Directory electron-app/dist |
            Where-Object { $_.Name -like '*-unpacked' } | Select-Object -First 1
          Compress-Archive -Path "$($src.FullName)/*" -DestinationPath "arduino-ide-mcp-${{ matrix.platform }}.zip"

      - name: Zip artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -e
          # macOS produces dist/mac* (the .app), Linux produces dist/*-unpacked
          src=$(ls -d electron-app/dist/*-unpacked 2>/dev/null | head -1 || true)
          if [ -z "$src" ]; then src=$(ls -d electron-app/dist/mac* 2>/dev/null | head -1); fi
          if [ -z "$src" ]; then echo "No build output found under electron-app/dist"; ls -la electron-app/dist; exit 1; fi
          ( cd "$src" && zip -ry "$GITHUB_WORKSPACE/arduino-ide-mcp-${{ matrix.platform }}.zip" . )

      - name: Upload to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: ${{ github.event.inputs.version || github.ref_name }}
          draft: true # publish manually after verifying the artifacts
          fail_on_unmatched_files: true
          body: |
            Unsigned development build of the Arduino IDE with the embedded MCP server.

            Each archive contains the unpacked application for its platform - unzip and run
            `Arduino IDE` (`Arduino IDE.exe` on Windows). The MCP server starts on
            `http://127.0.0.1:3847`; the connection config (with the auth token) is printed
            to the IDE console on launch.

            Artifacts are unsigned; on macOS you may need to allow the app in
            System Settings > Privacy & Security.
          files: arduino-ide-mcp-${{ matrix.platform }}.zip
